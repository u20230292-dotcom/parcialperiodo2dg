<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mariela Cruz</title>
    <link rel="stylesheet" href="style_contacto.css">
</head>
<body>

    <main class="contenedor-formulario">
        <h1 class="titulo-contacto">Contacto</h1>
        
        <form action="#" class="formulario-contacto">
            <div class="campo">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre..." required>
            </div>

            <div class="campo">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="6" placeholder="¿En qué puedo ayudarte?" required></textarea>
            </div>

            <button type="submit" class="boton-enviar">Enviar Formulario</button>
        </form>

        <nav class="retorno">
            <a href="file:///C:/Users/marie/OneDrive/Escritorio/WED_P2/index.html" class="enlace-inicio">← Volver a la página principal</a>
        </nav>
    </main>

</body>
</html>
